<section id="experience" class="section experience" aria-labelledby="experience-heading">
  <div class="container">
   <h2 id="experience-heading" class="section-title">Where I've worked</h2>
    <ol class="timeline" aria-label="Work history">
      @for (job of experience; track job.company) {
        <app-experience-item [job]="job" />
      }
    </ol>
  </div>
</section>
